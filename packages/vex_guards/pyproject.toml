[project]
name = "vex-guards"
dynamic = ["version"]
requires-python = ">=3.14"
dependencies = ["packaging>=24"]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

# Dev/CI-only tooling, never shipped in a prod image, but it follows the same shared root git
# tag as the three product packages for uniformity (spec 2026-07-10-git-driven-versioning).
# See the crawler pyproject for the full rationale (search_parent_directories + milestone-tag exclude).
[tool.hatch.version]
source = "vcs"
tag-pattern = '^v(?P<version>\d+\.\d+\.\d+)$'
fallback-version = "0.0.0"

[tool.hatch.version.raw-options]
search_parent_directories = true
git_describe_command = [
    "git", "describe", "--dirty", "--tags", "--long",
    "--match", "v[0-9]*.[0-9]*.[0-9]*", "--exclude", "*-*",
]

[tool.hatch.build.targets.wheel]
packages = ["src/vex_guards"]

[tool.pytest.ini_options]
addopts = "--cov=vex_guards --cov-branch --cov-report=term-missing --cov-fail-under=100"
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["vex_guards"]
