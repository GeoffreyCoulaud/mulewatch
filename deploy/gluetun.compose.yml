# Stack VPN (gluetun). amuled partage la netns de gluetun ;
# docker-proxy pour le port-sync.
# webui + prometheus + grafana sont toujours actifs, sans profil à ajouter.
# High-ID auto : VPN_PORT_FORWARDING=on (.env)
#   + port_sync.enabled: true (crawler.yml).
# Lancer :
#   docker compose -f deploy/gluetun.compose.yml up -d
#   docker compose -f deploy/gluetun.compose.yml --profile download up -d
name: mulewatch

include:
  - path: base.compose.yml

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    cap_add: [NET_ADMIN]
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      VPN_SERVICE_PROVIDER: ${VPN_SERVICE_PROVIDER:-protonvpn}
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY:?}
      SERVER_COUNTRIES: ${SERVER_COUNTRIES:-}
      VPN_PORT_FORWARDING: ${VPN_PORT_FORWARDING:-off}
      HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE: '{"auth":"none"}'
    networks:
      ec:
        aliases: [amuled]
    restart: unless-stopped

  amuled:
    image: ngosang/amule:3.0.0-1
    container_name: amuled
    network_mode: "service:gluetun"
    depends_on: [gluetun]
    environment:
      GUI_PWD: ${AMULE_EC_PASSWORD:?}
    volumes:
      - amule-state:/home/amule/.aMule
      - quarantine:/data/quarantine
    restart: unless-stopped

  docker-proxy:
    image: wollomatic/socket-proxy:1.12.2
    profiles: [download]
    command:
      - "-loglevel=info"
      - "-allowfrom=0.0.0.0/0"
      - "-listenip=0.0.0.0"
      - "-proxyport=2375"
      - "-socketpath=/var/run/docker.sock"
      - "-allowPOST=/v1\\..{1,2}/containers/amuled/restart"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks: [ec]
    # Root REQUIRED explicitly: the wollomatic image is built USER 65534, but the bind-mounted Docker
    # socket appears root:root (Docker Desktop) or root:docker (native Docker) -- only root can reach
    # it. Still confined: cap_drop ALL + read_only + no-new-privileges + allowlist restricted to a
    # single endpoint POST /containers/amuled/restart.
    user: "0:0"
    cap_drop: [ALL]
    security_opt: ["no-new-privileges:true"]
    read_only: true
    restart: unless-stopped
