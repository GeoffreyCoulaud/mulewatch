# Dependabot — keep dependencies up to date. One grouped weekly PR per ecosystem.
version: 2
updates:
  # GitHub Actions — scans .github/workflows/*.yml AND our composite action.yml
  # files (.github/actions/*/action.yml); bumps the pinned SHA and the trailing
  # "# vX.Y.Z" comment. Local "./..." action refs are ignored.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      github-actions:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(ci)"

  # Docker base images — the FROM lines of the three package Dockerfiles
  # (packages/{crawler,verifier,webui}/Dockerfile). Compose image refs are not
  # covered by the docker ecosystem.
  - package-ecosystem: "docker"
    directories:
      - "/packages/*"
    schedule:
      interval: "weekly"
    groups:
      docker:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(docker)"

  # Python dependencies — the uv workspace (root pyproject.toml + uv.lock).
  - package-ecosystem: "uv"
    directory: "/"
    schedule:
      interval: "weekly"
    groups:
      python:
        patterns:
          - "*"
    commit-message:
      prefix: "chore(deps)"
