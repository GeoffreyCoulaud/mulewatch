name: Setup uv env
description: Install uv (cache enabled) and sync the dev environment (uv sync --dev).
runs:
  using: composite
  steps:
    - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
      with:
        enable-cache: true
    - run: uv sync --dev
      shell: bash
