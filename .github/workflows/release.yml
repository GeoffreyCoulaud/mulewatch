name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

env:
  IMAGE_PREFIX: ghcr.io/geoffreycoulaud/emule-indexer

jobs:
  # Full gate + per-arch build/integration/push-by-digest (push: true). The images are
  # pushed by digest only; no consumable tag exists yet.
  validate:
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/validate.yml
    with:
      push: true

  # Fan-in: combine the per-arch digests into one multi-arch manifest per package and tag it.
  # This is the only step that publishes a consumable tag, and it runs only after `validate`
  # (build + integration) succeeded — so a tag never points at an un-integration-tested image.
  publish-manifest:
    needs: validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        package: [crawler, verifier, webui]
    steps:
      - name: Download digests — ${{ matrix.package }}
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: digest-${{ matrix.package }}-*
          path: /tmp/digests
          merge-multiple: true
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to ghcr.io
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Image tags — ${{ matrix.package }}
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.IMAGE_PREFIX }}-${{ matrix.package }}
          tags: |
            type=ref,event=branch
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable={{is_default_branch}}
      - name: Create manifest list and push
        working-directory: /tmp/digests
        run: |
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf '${{ env.IMAGE_PREFIX }}-${{ matrix.package }}@sha256:%s ' *)
      - name: Inspect
        run: docker buildx imagetools inspect ${{ env.IMAGE_PREFIX }}-${{ matrix.package }}:${{ steps.meta.outputs.version }}
