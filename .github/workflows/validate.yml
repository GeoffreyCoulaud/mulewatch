name: Validate

on:
  workflow_call:
    inputs:
      push:
        description: If true, the build-and-verify job also pushes each image to ghcr by digest.
        type: boolean
        default: false

permissions:
  contents: read

env:
  IMAGE_PREFIX: ghcr.io/geoffreycoulaud/mulewatch

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-uv-env
      - name: Static checks
        run: uv run poe lint-all

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: ./.github/actions/setup-uv-env
        with:
          save-cache: 'false'  # lint is the x86 cache writer; test restores only
      - name: Unit tests
        run: uv run poe test

  # One job per arch on its native runner: build the 3 images (loaded locally, and pushed
  # by digest when inputs.push), run the compose smoke stack against the local images, then
  # upload the digests for the release merge. The push exporter runs during the build, but
  # only publish-manifest publishes a tag — and it is downstream of this job's integration
  # step, so no tag ever references an image that failed integration.
  build-and-verify:
    needs: [lint, test]
    runs-on: ${{ matrix.arch == 'arm64' && 'ubuntu-24.04-arm' || 'ubuntu-latest' }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
    steps:
      # fetch-depth: 0 fetches the full history AND tags: the version step below derives the
      # product version from the pushed git tag, which a shallow checkout would not see. The
      # lint/test jobs stay shallow (their derived version is irrelevant).
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - uses: ./.github/actions/setup-uv-env
        with:
          # One uv-cache writer per runner arch: arm64 (the sole arm64 job) saves; amd64
          # restores lint's x86 cache. Avoids concurrent same-key saves → no cache warning.
          save-cache: ${{ matrix.arch == 'arm64' }}
      # Compute the product version once, the same way a local build would (hatch-vcs over the
      # tag). Injected into both images as the VERSION build-arg -> installed wheel metadata +
      # OCI label. hatch prints "Inspecting build dependencies" to stderr; the version is the
      # sole stdout line. On main/PR (no release tag at HEAD) this is a dev version like
      # 0.19.2.devN+g<sha>; on a vX.Y.Z tag push it is X.Y.Z.
      - name: Compute the product version from the git tag
        id: version
        run: |
          echo "value=$(cd packages/crawler && uvx --quiet --with hatch-vcs hatch version)" >> "$GITHUB_OUTPUT"
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Log in to ghcr.io
        if: ${{ inputs.push }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build crawler — ${{ matrix.arch }}
        id: crawler
        uses: ./.github/actions/docker-image
        with:
          package: crawler
          platform: linux/${{ matrix.arch }}
          image: ${{ env.IMAGE_PREFIX }}-crawler
          local-tag: ci-${{ github.sha }}
          push: ${{ inputs.push }}
          cache-scope: crawler-${{ matrix.arch }}
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
      - name: Build verifier — ${{ matrix.arch }}
        id: verifier
        uses: ./.github/actions/docker-image
        with:
          package: verifier
          platform: linux/${{ matrix.arch }}
          image: ${{ env.IMAGE_PREFIX }}-verifier
          local-tag: ci-${{ github.sha }}
          push: ${{ inputs.push }}
          cache-scope: verifier-${{ matrix.arch }}
          # Unique per build so the verifier's apk-plan probe stage always re-runs and re-resolves
          # the live Alpine index; the real apk layer then busts only when versions actually change.
          build-args: |
            VERSION=${{ steps.version.outputs.value }}
            APK_PROBE_NONCE=${{ github.run_id }}-${{ github.run_attempt }}
      - name: Integration — compose smoke stack (${{ matrix.arch }})
        run: ( cd packages/crawler && uv run pytest -m compose_integration --no-cov -q )
        env:
          IMAGE_TAG: ci-${{ github.sha }}
      - name: Export digests
        if: ${{ inputs.push }}
        run: |
          mkdir -p /tmp/digests/crawler /tmp/digests/verifier
          touch "/tmp/digests/crawler/${CRAWLER_DIGEST#sha256:}"
          touch "/tmp/digests/verifier/${VERIFIER_DIGEST#sha256:}"
        env:
          CRAWLER_DIGEST: ${{ steps.crawler.outputs.digest }}
          VERIFIER_DIGEST: ${{ steps.verifier.outputs.digest }}
      - name: Upload crawler digest
        if: ${{ inputs.push }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-crawler-${{ matrix.arch }}
          path: /tmp/digests/crawler/*
          if-no-files-found: error
          retention-days: 1
      - name: Upload verifier digest
        if: ${{ inputs.push }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: digest-verifier-${{ matrix.arch }}
          path: /tmp/digests/verifier/*
          if-no-files-found: error
          retention-days: 1

  # Single aggregation gate for branch protection: require only `validate / gate` instead of the
  # individual (matrix-suffixed) job checks — stable when jobs/matrix legs change. `if: always()`
  # is essential: GitHub treats a *skipped* required check as passing, so the gate must always run
  # and fail explicitly rather than be skipped when an upstream job fails.
  gate:
    needs: [lint, test, build-and-verify]
    if: ${{ always() }}
    runs-on: ubuntu-latest
    steps:
      - name: All validation jobs must succeed
        env:
          RESULTS: ${{ join(needs.*.result, ' ') }}
        run: |
          echo "Validation job results: $RESULTS"
          for r in $RESULTS; do
            [ "$r" = "success" ] || { echo "::error::a required validation job reported '$r'"; exit 1; }
          done
          echo "All validation jobs succeeded."
