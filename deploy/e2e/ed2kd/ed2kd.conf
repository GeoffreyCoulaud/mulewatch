// Config ed2kd de la suite e2e (spec e2e §5.1) — copie de vendor/ed2kd/ed2kd.conf.dist.
// Toutes les clés NON optionnelles sont requises (config.c:51-193 : chaque lookup manquant met
// ret=0 → "failed to load configuration file"). On garde les valeurs dist.

// server hash (32 hex, valide — config.c:90-91 hex2bin sur 16 octets)
server_hash = "cc9039c4e1b90e12756c50885dbe0e6f";

// listen address
listen_addr = "0.0.0.0";

// listen port (= EXPOSE 4661 ; config.c:62, listener.c)
listen_port = 4661;

// listen backlog
listen_backlog = 5;

// welcome message (optionnel)
welcome_message = "ed2kd e2e stub";

// allow lowid clients : 1 = filet de sécurité si le port-check entrant échoue (spec e2e §5.4) ;
// la source du seeder reste alors LowID (non listée comme source utile) → le download échoue,
// ce que l'e2e détecte. Le but est le HighID (port-check OK), allow_lowid évite juste un crash.
allow_lowid = 1;

// port check timeout (ms)
portcheck_timeout = 20000;

// server status notify interval (ms)
status_notify_interval = 5000;

// maximum connected clients
max_clients = 100000;

// maximum shared files on server
max_files = 100000000;

// maximum shared files per client
max_files_per_client = 20000;

// maximum number of client's file offers per second
max_offers_limit = 2;

// maximum number of client's search requests per second
max_searches_limit = 10;
