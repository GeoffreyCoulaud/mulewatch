{% extends "base.html" %}
{% block title %}Controls · mulewatch{% endblock %}
{% block content %}
<h1>Controls</h1>

{% for message in messages %}
<p class="control-banner" role="status">{{ message }}</p>
{% endfor %}

<section>
  <h2>Crawl</h2>
  <form method="post" action="/controls/force-cycle">
    <button type="submit">Force a cycle now</button>
  </form>
  <form method="post" action="/controls/pause">
    <button type="submit">Pause crawl</button>
  </form>
  <form method="post" action="/controls/resume">
    <button type="submit">Resume crawl</button>
  </form>
</section>

<section>
  <h2>Service</h2>
  <form method="post" action="/controls/restart">
    <button type="submit">Restart service</button>
  </form>
</section>
{% endblock %}
