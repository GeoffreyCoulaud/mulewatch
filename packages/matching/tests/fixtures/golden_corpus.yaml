# Corpus golden (cf. spec §16) : noms réels + forgés -> palier/cible/règle attendus.
# EXTENSIBLE PAR LA COMMUNAUTÉ : ajouter un cas = ajouter une entrée ci-dessous.
# Un cas : { id, filename, tier, target_id, rule_name } ou { id, filename, discarded: true }
# ou { id, filename, decisions: [{ target_id, tier, rule_name }, ...] } (fan-out multi-cible).
cases:
  - id: real_62A_full_release
    filename: "[TV] KERORO MISSION TITAR N°062A « Les demoiselles cambrioleuses » [Dimanche 21 septembre 2008 à 16H50 sur TELETOON].avi"
    tier: download
    target_id: 062A
    rule_name: id_segment_exact

  - id: ascii_no_accents_62A
    filename: "KERORO MISSION TITAR N062A Les demoiselles cambrioleuses 21 septembre 2008 TELETOON.avi"
    tier: download
    target_id: 062A
    rule_name: id_segment_exact

  - id: match_via_teletoon_source_marker_title
    # Sans numéro de segment -> id_segment_exact faux, mais teletoon (source_marker) + titre -> title_confirmed (download).
    filename: "[TV] KERORO MISSION TITAR « Les demoiselles cambrioleuses » [21 septembre 2008 sur TELETOON].avi"
    tier: download
    target_id: 062A
    rule_name: title_confirmed

  - id: segment_id_non_video_is_discarded
    # 062A + titre MAIS extension ni vidéo ni archive -> aucune règle (gate média sur
    # keroro_large) -> écarté, pas catalogué.
    filename: "KERORO N°062A Les demoiselles cambrioleuses.txt"
    discarded: true

  - id: keroro_only_is_unidentified
    # "Keroro" alone -> keroro_large (catalog) over every target -> unidentified.
    # The winning target_id is an arbitrary min-key artefact, deliberately not asserted.
    # NB: neutral filler (not "Gunso", now vetoed as a Japanese title).
    filename: "Keroro rediffusion.mkv"
    unidentified: true

  - id: decoy_non_keroro_naruto
    filename: "Naruto épisode 062 VF.avi"
    discarded: true

  - id: decoy_random_movie
    filename: "Big.Buck.Bunny.1080p.mkv"
    discarded: true

  - id: decoy_italian_keroro
    # Contient "ITA" -> foreign_lang matche -> french_safe bloque toutes les règles.
    filename: "Keroro Missione Titar 62 ITA.avi"
    discarded: true

  - id: decoy_korean_keroro
    # Contient "KOR" -> foreign_lang matche -> french_safe bloque toutes les règles.
    filename: "Keroro 62 KOR.avi"
    discarded: true

  - id: seasonal_sxxexx_62A_download
    # Forme S02E11A (saison 2, épisode 11, segment A = absolu 62A) + keroro + vidéo.
    filename: "Keroro Mission Titar S02E11A Les demoiselles cambrioleuses.avi"
    tier: download
    target_id: 062A
    rule_name: id_segment_exact

  - id: seasonal_NxM_62B_download
    # Forme 2x11B -> segment B (absolu 62B).
    filename: "Keroro Mission Titar 2x11B Le grand combat sous-marin.avi"
    tier: download
    target_id: 062B
    rule_name: id_segment_exact

  - id: seasonal_episode_no_segment_falls_back_to_catalog
    # "S2E11" with no letter -> segment_id does NOT match (A/B precision) -> keroro_large (unidentified).
    filename: "Keroro S2E11.mkv"
    unidentified: true

  - id: decoy_resolution_not_a_segment
    # "1920x1080" ne doit pas déclencher la branche NxM ; keroro -> catalog, PAS download.
    filename: "Keroro 1920x1080 BDRip.mkv"
    unidentified: true

  - id: title_review_notify_without_source_marker
    # Titre proche, sans segment_id ni marqueur de source -> title_review (notify).
    filename: "Keroro Les demoiselles cambrioleuses.avi"
    tier: notify
    target_id: 062A
    rule_name: title_review

  - id: title_confirmed_via_vf_marker
    # Titre + marqueur VF -> title_confirmed (download).
    filename: "Keroro VF Les demoiselles cambrioleuses.avi"
    tier: download
    target_id: 062A
    rule_name: title_confirmed

  - id: title_confirmed_via_idf1_marker
    # Titre + marqueur IDF1 (autre chaîne) -> title_confirmed (download).
    filename: "Keroro IDF1 Les demoiselles cambrioleuses.avi"
    tier: download
    target_id: 062A
    rule_name: title_confirmed

  - id: archive_with_segment_id_is_notify
    # Archive (.rar) + segment_id -> archive_candidate (notify, revue humaine).
    filename: "Keroro N°062A Les demoiselles cambrioleuses.rar"
    tier: notify
    target_id: 062A
    rule_name: archive_candidate

  - id: not_episode_opening_demotes_title_to_catalog
    # "opening" now excludes it from is_episode, so keroro_large no longer catalogs it -> discarded.
    filename: "Keroro Les demoiselles cambrioleuses opening.avi"
    discarded: true

  - id: japanese_comic_zip_is_discarded
    # [comic] + 軍曹 is a manga, not a broadcast episode. The CJK title escapes foreign_lang
    # and .zip is a generic archive, so before this change it was catalogued as unidentified.
    # not_episode(comic) now makes is_episode false -> discarded.
    filename: "[comic][ケロロ軍曹][KERORO][吉崎観音].vol.09.zip"
    discarded: true

  - id: english_movie_marker_is_discarded
    # The theatrical film is not a TV episode. not_episode(movie) -> discarded. (The real
    # [T-N]Keroro_Gunsou_Movie file is already vetoed by foreign_lang "Gunsou"; this synthetic
    # case guards the new 'movie' marker on its own.)
    filename: "Keroro Movie special edition.avi"
    discarded: true

  # --- Gate média (2026-07-02) : le catalogue permissif keroro_large exige is_video OU
  #     is_archive. cbz/cbr sont des formats COMICS (ZIP/RAR déguisés), volontairement HORS
  #     de is_archive -> écartés, jamais catalogués. ---
  - id: non_video_non_archive_mp3_is_discarded
    # .mp3 -> ni is_video ni is_archive -> écarté (gate média sur keroro_large), pas catalogué.
    filename: "Keroro N°062A Les demoiselles cambrioleuses.mp3"
    discarded: true

  - id: manga_cbz_is_discarded
    # Format comic (.cbz = ZIP déguisé) mais PAS une archive générique -> écarté.
    filename: "Manga FR - Sergent Keroro - 02 - (Mine YOSHIZAKI) - [Digital-1200].cbz"
    discarded: true

  - id: manga_cbr_is_discarded
    # Format comic (.cbr = RAR déguisé) hors is_archive -> écarté.
    filename: "Keroro vol 03 - Mine Yoshizaki.cbr"
    discarded: true

  - id: manga_pdf_is_discarded
    # .pdf ni vidéo ni archive -> écarté.
    filename: "Keroro Vol 30 - Mine Yoshizaki.pdf"
    discarded: true

  - id: bare_archive_zip_stays_catalog
    # Archive GÉNÉRIQUE (.zip) sans preuve d'épisode -> keroro_large (catalog) via la
    # branche is_archive du gate (une archive peut contenir l'épisode).
    filename: "Keroro rediffusion.zip"
    unidentified: true

  - id: decoy_dino_riders_via_titar
    # titar remonte ce Dino-Riders ES ; "dino-riders" -> foreign_lang -> écarté (même avec titar).
    filename: "Dino-Riders - 10 - Titar pierde los estribos.avi"
    discarded: true

  - id: decoy_italian_content_word_guerriero
    filename: "Keroro il guerriero 62.avi"
    discarded: true

  - id: decoy_country_code_jp
    filename: "Keroro Mission Titar 62 (JP).avi"
    discarded: true

  - id: decoy_signor_italian
    filename: "Keroro signor N°062A.avi"
    discarded: true

  # --- Anti-match enrichi (filtre aMule 2026-07-01) : marqueurs étrangers -> écartés ---
  - id: decoy_japanese_marker_japan
    # "Japan" borné -> foreign_lang -> écarté (version japonaise, pas le doublage FR).
    filename: "Keroro Mission Titar 62 Japan.avi"
    discarded: true

  - id: decoy_japanese_code_jap
    # "JAP" borné (parenthèses = non-word) -> foreign_lang -> écarté.
    filename: "Keroro Titar N°062A (JAP).avi"
    discarded: true

  - id: decoy_japanese_title_gunso
    # "Gunso"/"Gunsou" = titre japonais ケロロ軍曹 -> foreign_lang -> écarté.
    filename: "Keroro Gunso 62A.avi"
    discarded: true

  - id: decoy_english_title_sgt_frog
    # "Sgt. Frog" = titre anglais -> foreign_lang -> écarté.
    filename: "Sgt. Frog Keroro N°062A.avi"
    discarded: true

  - id: decoy_josconcillo
    # "Josconcillo" (release étrangère connue) -> foreign_lang -> écarté.
    filename: "Keroro Titar 62 Josconcillo.avi"
    discarded: true

  # --- Foreign-marker + hash-digit precision hardening (2026-07-04) ---
  - id: foreign_big5_r3_taiwanese_discarded
    # Taiwanese R3 DVD rip (BIG5): foreign_lang veto -> french_safe false -> discarded.
    filename: "[KERORO][R3_DVDRIP][09][640x480.x264.AAC.2AUDIO.BIG5][7C094A47].mkv"
    discarded: true

  - id: foreign_gb_popgo_chinese_discarded
    # Real catalogued name. [GB] = GB2312 subtitles (Simplified Chinese); POPGO = a Chinese
    # fansub group. Complement of BIG5 (Traditional, already vetoed): the GB* encoding tags
    # must veto too -> french_safe false -> discarded (not catalogued as unidentified).
    filename: "[POPGO][Keroro][GB]05(28D86ED1).avi"
    discarded: true

  - id: foreign_spanish_xete_discarded
    # Spanish dub (XeTe group): foreign_lang veto -> discarded.
    filename: "Keroro 35 - El gran plan del cumple de Natsumi (DVD TV dual by XeTe).avi"
    discarded: true

  - id: hash_digits_not_matched_as_episode_number
    # French-safe, no real episode number: "094" appears ONLY inside the CRC tag.
    # Before 1b: segment_id_loose matched 094 -> numero_nu (notify) on mono 094A.
    # After 1b: the hex-bordered number no longer matches -> keroro_large catch-all.
    filename: "Keroro rediffusion [7C094A47].avi"
    unidentified: true

  # --- Multi-target fan-out (spec §3/§11): a whole-episode file resolves BOTH segments. ---
  - id: bare_number_fans_out_both_segments
    # §3 row 1 / §11 clean bare number: no segment-level signal -> 062A + 062B (rule 2).
    filename: "Keroro 62.avi"
    decisions:
      - { target_id: 062A, tier: notify, rule_name: numero_nu }
      - { target_id: 062B, tier: notify, rule_name: numero_nu }

  - id: bare_number_with_source_marker_fans_out_download
    # §3 row 3: bare number + source marker -> both segments in download (no tier cap).
    filename: "Keroro 62 teletoon.avi"
    decisions:
      - { target_id: 062A, tier: download, rule_name: numero_nu_confirmed }
      - { target_id: 062B, tier: download, rule_name: numero_nu_confirmed }

  - id: both_segment_titles_fan_out_both_segments
    # §11 both titles present: each title pins its own segment (rule 1) -> 062A + 062B.
    filename: "Keroro Les demoiselles cambrioleuses Le grand combat sous-marin.avi"
    decisions:
      - { target_id: 062A, tier: notify, rule_name: title_review }
      - { target_id: 062B, tier: notify, rule_name: title_review }

  - id: title_a_plus_bare_number_pins_a_only
    # §3 row 2 / §11: title A cuts the fan-out (rule 1) -> a single decision on 062A.
    filename: "Keroro 62 Les demoiselles cambrioleuses.avi"
    tier: notify
    target_id: 062A
    rule_name: title_review

  # --- Bare-number precision (spec 2026-07-08): date veto + dropped seasonal collision ---
  - id: bare_21_no_date_pins_absolute_only
    # Dropped {seasonal_number}: bare "21" is only episode 21, not also 72 (S2E21).
    filename: "Keroro 21.avi"
    decisions:
      - { target_id: 021A, tier: notify, rule_name: numero_nu }
      - { target_id: 021B, tier: notify, rule_name: numero_nu }

  - id: numeric_date_veto_pins_exact_only
    # "21/09/2008" is a broadcast date, not episode numbers: only the exact N°062A stands.
    filename: "[TV] KERORO MISSION TITAR N°062A x 21/09/2008 TELETOON.avi"
    tier: download
    target_id: 062A
    rule_name: id_segment_exact

  - id: abbrev_month_date_veto_pins_exact_only
    # The abbreviated month "sept" still vetoes the day-of-month "21".
    filename: "KERORO N°062A x 21 sept 2008 TELETOON.avi"
    tier: download
    target_id: 062A
    rule_name: id_segment_exact

  - id: bare_date_only_is_unidentified
    # A broadcast date with no episode id no longer fabricates episodes 21/72.
    filename: "KERORO MISSION TITAR 21 septembre 2008 TELETOON.avi"
    unidentified: true

  - id: month_like_word_not_date_vetoed
    # The \b anchor: "marseille" starts like "mars" but is not a month, so 62 still matches.
    filename: "Keroro 62 marseille.avi"
    decisions:
      - { target_id: 062A, tier: notify, rule_name: numero_nu }
      - { target_id: 062B, tier: notify, rule_name: numero_nu }
