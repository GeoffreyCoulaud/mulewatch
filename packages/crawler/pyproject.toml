[project]
name = "mulewatch"
dynamic = ["version"]
description = "Crawler eMule — surveillance, catalogue, auto-download (Keroro VF lost media)"
requires-python = ">=3.14"
dependencies = [
    "apprise>=1.9",
    "catalog-matching",
    "pyyaml>=6.0.3",
    "httpx>=0.28",
    "prometheus-client>=0.21",
    "starlette>=1.3",
    "uvicorn>=0.30",
    "jinja2>=3.1",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

# Version derived from a single pushed, pure-semver git tag `vX.Y.Z` (spec
# 2026-07-10-git-driven-versioning). The tag lives at the shared repo root, so all four
# workspace members resolve to the same number. tag-pattern extracts the version; the describe
# command below is the part that actually matters: the milestone tags `vX.Y.Z-<name>` are the
# NEAREST tags on every commit, so without `--exclude '*-*'` git describe returns one of them
# and setuptools-scm fails to parse it (empirically verified). Excluding dashed tags makes it
# fall back to the last pure-semver tag (`v0.19.1` -> e.g. `0.19.2.dev219+g<sha>`). The Docker
# build has no `.git`; it injects SETUPTOOLS_SCM_PRETEND_VERSION, which overrides all of this.
[tool.hatch.version]
source = "vcs"
tag-pattern = '^v(?P<version>\d+\.\d+\.\d+)$'
fallback-version = "0.0.0"

[tool.hatch.version.raw-options]
# The .git lives at the shared repo root, not in this member dir: without this, setuptools-scm
# refuses to look in parent directories and reports "version missing" (falling back to 0.0.0).
search_parent_directories = true
git_describe_command = [
    "git", "describe", "--dirty", "--tags", "--long",
    "--match", "v[0-9]*.[0-9]*.[0-9]*", "--exclude", "*-*",
]

[tool.hatch.build.targets.wheel]
packages = ["src/mulewatch"]

[tool.pytest.ini_options]
addopts = '--cov=mulewatch --cov-report=term-missing --cov-fail-under=100 --strict-markers -m "not ec_integration and not orchestration_integration and not download_integration and not verify_integration and not compose_integration"'
testpaths = ["tests"]
markers = [
    "ec_integration: tests d'intégration contre un amuled réel (Docker requis) — déselectionnés par défaut ; run dédié : cd packages/crawler && uv run pytest -m ec_integration --no-cov",
    "orchestration_integration: boucle de crawl réelle contre un amuled testcontainers (Docker requis) — déselectionnés par défaut ; run dédié : cd packages/crawler && uv run pytest -m orchestration_integration --no-cov",
    "download_integration: add_link + lecture de la file de download contre un amuled réel (Docker requis) — déselectionnés par défaut ; run dédié : cd packages/crawler && uv run pytest -m download_integration --no-cov",
    "verify_integration: boucle de vérification contre le vrai service verifier (ASGITransport, sans Docker) — déselectionnés par défaut ; run dédié : cd packages/crawler && uv run pytest -m verify_integration --no-cov",
    "compose_integration: smoke e2e de la stack docker compose assemblée (sans VPN) — Docker+compose requis ; déselectionné par défaut ; run dédié : cd packages/crawler && uv run pytest -m compose_integration --no-cov",
]
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.run]
branch = true
source = ["mulewatch"]

[tool.coverage.report]
show_missing = true
fail_under = 100
exclude_also = ["if TYPE_CHECKING:"]

[tool.sqlfluff.core]
dialect = "sqlite"
max_line_length = 100

[tool.sqlfluff.rules.references.keywords]
ignore_words = "key,value"
