# Politique du crawler (versionné, partageable — spec orchestration §5).
# Toutes les durées en SECONDES. Défauts raisonnables pour un nœud d'observation.

cycle_interval_seconds: 300.0        # cadence visée d'un cycle complet (5 min)
search_poll_budget_seconds: 30.0     # attente max des résultats d'une recherche
search_poll_interval_seconds: 5.0    # pas de polling de la progression
keyword_pause_min_seconds: 1.0       # jitter inter-mots-clés : borne basse
keyword_pause_max_seconds: 4.0       # jitter inter-mots-clés : borne haute
decision_poll_interval_seconds: 5.0  # filet du nudge (consommateur futur, plans D/E)
shutdown_deadline_seconds: 10.0      # borne dure de l'arrêt propre (spec §6)

backoff:                             # backoff par (instance, canal) — exponentiel + jitter
  base_seconds: 2.0                  #   (persisté dans scheduler_state, survit au redémarrage)
  cap_seconds: 300.0
  factor: 2.0
  jitter_ratio: 0.3                  # jitter additionnel : jusqu'à +30 % du délai nominal

download:                            # auto-download (D-download ; activé live en D-verify)
  poll_interval_seconds: 30.0        # cadence de relevé de la file de download (le nudge réveille plus tôt)
  disk_cap_bytes: 53687091200        # plafond disque applicatif (~50 Gio) ; au-dessus → on diffère

verify:                              # pipeline de vérification (D-verify ; activé live si verifier_url défini)
  poll_interval_seconds: 10.0        # cadence de claim de la file de vérification quand elle est vide

observability:                       # Plan E — métriques Prometheus + niveau de log
  log_level: INFO                    # DEBUG/INFO/WARNING/ERROR/CRITICAL
  metrics:
    enabled: true                    # expose /metrics sur un serveur HTTP dédié
    port: 9090                       # port du serveur de métriques
  notification_timeout_seconds: 5.0  # borne par notification apprise (E-D13)

# port-sync (High-ID) — OPTIONNEL ; n'est ARMÉ que si gluetun_control_url ET restarter_url sont
# aussi présents dans local.yaml (les 3 réglages sont solidaires, sinon ConfigError au démarrage).
# port_sync:
#   poll_interval_seconds: 60          # cadence du poll gluetun + comparaison du port d'écoute
#   restart_min_interval_seconds: 300  # rate-limit des restarts : ≤ 1 restart / 5 min
