[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
emule-indexer = { workspace = true }
download-verifier = { workspace = true }

[dependency-groups]
dev = [
  "emule-indexer",
  "download-verifier",
  "pytest>=8",
  "pytest-cov>=5",
  "pytest-asyncio>=1.2",
  "mypy>=1.10",
  "ruff>=0.5",
  "sqlfluff>=3.0",
  "testcontainers>=4.10",
  "types-pyyaml>=6.0.12.20260518",
]

[tool.ruff]
line-length = 100
src = [
  "packages/crawler/src",
  "packages/crawler/tests",
  "packages/verifier/src",
  "packages/verifier/tests",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.12"
strict = true
# `packages/verifier/tests/` n'a DÉLIBÉRÉMENT pas de `__init__.py` : sans lui, mypy ne voit
# qu'un seul module `tests` (celui du crawler) et la collision « Duplicate module named tests »
# au niveau du mypy racine est évitée. Le jour où le verifier aura des imports `from tests.…`
# (donc un `tests/__init__.py`), il faudra le VRAI correctif — mypy par-paquet, renommer un
# des paquets de test, ou `exclude` — et non rajouter un `mypy_path` (inerte ici).
files = [
  "packages/crawler/src",
  "packages/crawler/tests",
  "packages/verifier/src",
  "packages/verifier/tests",
]

[[tool.mypy.overrides]]
module = "re2"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "testcontainers.*"
ignore_missing_imports = true
