name: Grype daily SBOM scan

on:
  schedule:
    # Every morning at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: read
  packages: read
  security-events: write  # required to upload SARIF to GitHub code scanning

env:
  IMAGE_PREFIX: ghcr.io/geoffreycoulaud/mulewatch

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [crawler, verifier]
    steps:
      - name: Check out the repository (for the vex_guards consistency checks)
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up uv and sync the dev environment
        uses: ./.github/actions/setup-uv-env
        with:
          save-cache: 'false'  # restore only; validate is the x86 cache writer

      - name: Install Grype CLI (pinned) for the stale-claims check
        run: |
          curl -sSfL https://raw.githubusercontent.com/anchore/grype/fa8b7e2a528cf1f8b098123f256c61db9e5df69c/install.sh \
            | sh -s -- -b "$HOME/.local/bin" v0.115.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2

      - name: Log in to ghcr.io
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The main scan's SBOM and VEX come from the image's own signed attestations (the repo
      # checkout above serves only the vex_guards consistency checks below). verify-attestation
      # (not merely fetch) proves the SBOM and VEX were produced by OUR release.yml for THIS
      # image digest. jq decodes the DSSE payload and extracts the raw predicate.
      #   - Syft-JSON SBOM (type https://syft.dev/bom): scanned instead of CycloneDX because
      #     it preserves the image source identity image-scoped OpenVEX matching needs.
      #   - OpenVEX (type openvex): applied via Grype's --vex.
      - name: Extract SBOM and VEX from image attestations
        env:
          CERT_REGEXP: "^${{ github.server_url }}/${{ github.repository }}/.github/workflows/release.yml@refs/"
        run: |
          IMAGE="${IMAGE_PREFIX}-${{ matrix.package }}:latest"
          verify() {  # $1 = predicate type -> stdout: the raw predicate JSON
            cosign verify-attestation \
              --type "$1" \
              --certificate-identity-regexp "${CERT_REGEXP}" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "${IMAGE}" \
              | jq -rs '.[0].payload | @base64d | fromjson | .predicate'
          }
          verify "https://syft.dev/bom" > /tmp/sbom.syft.json
          verify openvex                > /tmp/vex.openvex.json

      # The two vex_guards image checks run in SARIF mode against the versioned VEX: they always
      # exit 0, so a drift surfaces in Code scanning rather than failing this daily job.
      - name: Check image-family VEX claims against the SBOM
        run: >
          uv run python -m vex_guards.check_image_claims
          --sbom /tmp/sbom.syft.json
          --vex security/${{ matrix.package }}.vex.openvex.json
          --format sarif --output /tmp/image-claims.sarif

      - name: Upload image-claims SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: /tmp/image-claims.sarif
          category: vex-image-claims-${{ matrix.package }}

      - name: Check for stale VEX entries no longer reported by Grype
        run: >
          uv run python -m vex_guards.check_stale_claims
          --sbom /tmp/sbom.syft.json
          --vex security/${{ matrix.package }}.vex.openvex.json
          --format sarif --output /tmp/stale.sarif

      - name: Upload stale-claims SARIF to code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: /tmp/stale.sarif
          category: vex-stale-claims-${{ matrix.package }}

      # Scans the SBOM (not the live image) so results are reproducible, applying the
      # OpenVEX pulled from the image. fail-build is false: findings are surfaced via
      # SARIF, not a job failure; triage happens through VEX.
      - name: Run Grype against the attested SBOM
        uses: anchore/scan-action@e1165082ffb1fe366ebaf02d8526e7c4989ea9d2 # v7.4.0
        id: scan
        with:
          sbom: /tmp/sbom.syft.json
          vex: /tmp/vex.openvex.json
          fail-build: "false"
          output-format: sarif

      # Distinct category per image: without it, the two matrix legs' SARIF uploads
      # overwrite each other in Code scanning.
      - name: Upload SARIF to GitHub code scanning
        if: always()
        uses: github/codeql-action/upload-sarif@e4fba868fa4b1b91e1fdab776edc8cfbe6e9fb81 # v4.37.3
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: grype-${{ matrix.package }}
