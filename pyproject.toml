[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
emule-indexer = { workspace = true }
download-verifier = { workspace = true }
catalog-matching = { workspace = true }
catalog-webui = { workspace = true }

[dependency-groups]
dev = [
  "emule-indexer",
  "download-verifier",
  "catalog-matching",
  "catalog-webui",
  "pytest>=9.1.1",
  "pytest-cov>=5",
  "pytest-asyncio>=1.2",
  "mypy>=1.10",
  "ruff>=0.15.20",
  "sqlfluff>=3.0",
  "testcontainers>=4.10",
  "types-pyyaml>=6.0.12.20260518",
]

[tool.ruff]
line-length = 100
src = [
  "packages/crawler/src",
  "packages/crawler/tests",
  "packages/matching/src",
  "packages/matching/tests",
  "packages/verifier/src",
  "packages/verifier/tests",
  "packages/webui/src",
  "packages/webui/tests",
]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "SIM"]

[tool.mypy]
python_version = "3.12"
strict = true
# Stratégie de résolution des noms de modules dans le workspace :
# - `packages/crawler/tests/` a un `__init__.py` (imports `from tests.…` internes) → paquet `tests`
# - `packages/verifier/tests/`, `packages/matching/tests/` et `packages/webui/tests/` n'ont PAS de
#   `__init__.py` → modules plats. Les noms de fichiers de tests plats doivent être uniques pour
#   éviter les collisions mypy (ex. `test_config` → renommé `test_matcher_config` côté matching ;
#   webui utilise la convention `test_webui_<chose>.py`).
files = [
  "packages/crawler/src",
  "packages/crawler/tests",
  "packages/matching/src",
  "packages/matching/tests",
  "packages/verifier/src",
  "packages/verifier/tests",
  "packages/webui/src",
  "packages/webui/tests",
]

[[tool.mypy.overrides]]
module = "re2"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "pyseccomp"
ignore_missing_imports = true

[[tool.mypy.overrides]]
module = "testcontainers.*"
ignore_missing_imports = true
