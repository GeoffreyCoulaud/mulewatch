[project]
name = "catalog-webui"
version = "0.0.0"
description = "WebUI de consultation du catalogue (lecture seule, SSR) — déployable séparé"
requires-python = ">=3.14"
dependencies = [
    "catalog-matching",
    "starlette>=1.3",
    "uvicorn>=0.30",
    "jinja2>=3.1",
    "pyyaml>=6.0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/catalog_webui"]

[tool.pytest.ini_options]
addopts = '--cov=catalog_webui --cov-report=term-missing --cov-fail-under=100 --strict-markers'
testpaths = ["tests"]
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.run]
branch = true
source = ["catalog_webui"]

[tool.coverage.report]
show_missing = true
fail_under = 100
exclude_also = ["if TYPE_CHECKING:"]

[tool.sqlfluff.core]
dialect = "sqlite"
max_line_length = 100

[tool.sqlfluff.rules.references.keywords]
ignore_words = "key,value"
