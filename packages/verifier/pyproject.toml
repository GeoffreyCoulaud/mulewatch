[project]
name = "download-verifier"
dynamic = ["version"]
description = "Service de vérification des fichiers en quarantaine — analyseur confiné (déployable séparé)"
requires-python = ">=3.14"
dependencies = [
    "starlette>=1.3",
    "uvicorn>=0.51.0",
    "puremagic>=1.28",
    "prometheus-client>=0.21",
    "pyyaml>=6.0.3",
    "pyseccomp>=0.1.2",
]

[build-system]
requires = ["hatchling", "hatch-vcs"]
build-backend = "hatchling.build"

# Version from the shared root git tag (spec 2026-07-10-git-driven-versioning). See the crawler
# pyproject for the full rationale (search_parent_directories finds the root .git from this member
# dir; `--exclude '*-*'` skips the milestone tags `vX.Y.Z-<name>` that would otherwise fail to parse).
[tool.hatch.version]
source = "vcs"
tag-pattern = '^v(?P<version>\d+\.\d+\.\d+)$'
fallback-version = "0.0.0"

[tool.hatch.version.raw-options]
search_parent_directories = true
git_describe_command = [
    "git", "describe", "--dirty", "--tags", "--long",
    "--match", "v[0-9]*.[0-9]*.[0-9]*", "--exclude", "*-*",
]

[tool.hatch.build.targets.wheel]
packages = ["src/download_verifier"]

[tool.pytest.ini_options]
addopts = '--cov=download_verifier --cov-report=term-missing --cov-fail-under=100 --strict-markers -m "not analysis_integration"'
testpaths = ["tests"]
markers = [
    "analysis_integration: spawn réel de l'enfant confiné + vrai ffprobe (ffmpeg requis) ; clamav (clamscan + base, sinon skip) et ring seccomp (libseccomp, sinon skip) si dispo — déselectionnés par défaut ; cf. docs/testing-guide.md ; run : cd packages/verifier && uv run pytest -m analysis_integration --no-cov",
]
asyncio_mode = "strict"
asyncio_default_fixture_loop_scope = "function"

[tool.coverage.run]
branch = true
source = ["download_verifier"]

[tool.coverage.report]
show_missing = true
fail_under = 100
exclude_also = ["if TYPE_CHECKING:"]
