# Config LOCALE (machine + secret) — MODÈLE versionné (spec orchestration §5).
# Copier en config/local.yaml (gitignoré) et renseigner les valeurs réelles.

amules:                              # ≥ 1 instance amuled joignable par EC
  - name: amule-1                    # étiquette UNIQUE (logging + clé de backoff)
    host: gluetun                    # hôte EC (le conteneur gluetun expose le port d'amuled)
    port: 4712                       # port EC
    password: change-me              # mot de passe EC (secret)

catalog_db_path: /data/catalog/catalog.db  # base catalogue (append-only, partageable ; volume catalog-db @ /data/catalog)
local_db_path: /data/local/local.db        # base opérationnelle (jamais fusionnée ; volume local-db @ /data/local)

# node_id: optionnel — override l'identité du nœud ; sinon celle de local.db est utilisée.

# Endpoint EC de DOWNLOAD (D-download) — sa PROPRE connexion (peut viser un daemon dédié ou
# partagé). Optionnel tant que l'auto-download n'est pas activé (D-verify) ; si présent,
# staging_dir et quarantine_dir sont requis et DOIVENT être sur le même système de fichiers.
# download_endpoint:
#   name: amule-dl
#   host: gluetun
#   port: 4712
#   password: change-me
# staging_dir: /data/quarantine      # où amuled écrit les fichiers complétés (volume quarantine partagé)
# quarantine_dir: /data/quarantine   # cible du rename atomique (même FS que staging_dir ; même volume)

# URL du service verifier (D-verify) — sa présence ACTIVE le mode full (download + vérif) ;
# absente = mode observateur (les deux boucles restent OFF). Au démarrage en full, le crawler
# health-check le verifier et REFUSE de démarrer s'il est injoignable (pas de download sans vérif).
# verifier_url: http://verifier:8000
