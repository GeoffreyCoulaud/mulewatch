# Topologie de deploiement emule-indexer (spec packaging §4/§6).
# Profils : `observer` (gluetun+amuled+crawler, pas de download/verif) ; `full` (+ verifier,
# auto-download + verification). Secrets VPN dans .env (gitignore ; voir .env.example).
# Le mode du crawler vient de config/local.yaml monte (verifier_url present => full).
# Durcissement niveau conteneur (F-D2) sur les services batis ; gluetun/amuled = exceptions.

services:
  gluetun:
    image: qmcgaw/gluetun:latest
    profiles: [observer, full]
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    environment:
      # Le port forwarding gluetun (High-ID joignable) n'existe QUE pour 4 providers : ProtonVPN,
      # PIA, PrivateVPN, PerfectPrivacy. Avec tout autre provider, amuled reste en Low-ID (sauf à
      # ouvrir/rediriger un port soi-meme). Exemple ci-dessous : ProtonVPN (l'un des 4).
      VPN_SERVICE_PROVIDER: protonvpn
      VPN_TYPE: wireguard
      WIREGUARD_PRIVATE_KEY: ${WIREGUARD_PRIVATE_KEY}
      SERVER_COUNTRIES: ${SERVER_COUNTRIES:-}
      # NAT-PMP/port-forwarding (l'un des 4 providers supportes) : alimente le port-sync (High-ID)
      # via GET http://gluetun:8000/v1/portforward. Tant que le port-sync n'est pas configure
      # (gluetun_control_url+restarter_url+port_sync dans local.yaml), Low-ID est l'etat normal.
      VPN_PORT_FORWARDING: "on"
      # Control-server : pas d'auth sur le reseau interne `ec` (seuls amuled/crawler/proxy y sont).
      # Var + format verifies sur la doc gluetun (auth-by-default depuis v3.40).
      HTTP_CONTROL_SERVER_AUTH_DEFAULT_ROLE: '{"auth":"none"}'
    networks:
      - ec
    restart: unless-stopped

  amuled:
    image: ngosang/amule:3.0.0-1
    # Nom de conteneur FIXE (ignore le préfixe de projet) : la boucle port-sync redémarre amuled via
    # `POST /v1.x/containers/amuled/restart` — l'allowlist du `docker-proxy` ET le path du
    # `HttpMuleRestarter` codent en dur `amuled`. Sans ce nom fixe, le conteneur serait
    # `<projet>-amuled-1` et le restart ferait 404 → port-sync cassé (jamais de High-ID). Singleton
    # par hôte (un seul amuled par déploiement), donc le nom global est acceptable.
    container_name: amuled
    profiles: [observer, full]
    # Partage la netns de gluetun (killswitch : tout le P2P sort par le VPN). Pas de `networks:`
    # quand network_mode est `service:` — amuled est joignable via gluetun sur le port EC 4712.
    network_mode: "service:gluetun"
    depends_on:
      - gluetun
    environment:
      # Mot de passe EC (secret) — partage avec le crawler via local.yaml. PUID/PGID : voir
      # l'inconnu fleche #3 (l'image impose son propre user ; on ne durcit que ce qu'elle tolere).
      GUI_PWD: ${AMULE_EC_PASSWORD}
    volumes:
      - amule-state:/home/amule/.aMule
      - quarantine:/data/quarantine        # staging : amuled ecrit les fichiers completes ici
    restart: unless-stopped

  crawler:
    image: ghcr.io/geoffreycoulaud/emule-indexer-crawler:latest
    build:
      context: .
      dockerfile: packages/crawler/Dockerfile
    profiles: [observer, full]
    depends_on:
      - amuled
    command:
      - "--local"
      - "/app/config/local.yaml"
      - "--crawler"
      - "/app/config/crawler.yaml"
      - "--targets"
      - "/app/config/targets.yaml"
      - "--matcher"
      - "/app/config/matcher.yaml"
    volumes:
      - ./config:/app/config:ro                # config (local.yaml decide observer/full)
      - quarantine:/data/quarantine            # cible du os.replace (meme FS que staging)
      - catalog-db:/data/catalog               # catalog.db (chemin local.yaml : /data/catalog/catalog.db)
      - local-db:/data/local                   # local.db   (chemin local.yaml : /data/local/local.db)
    networks:
      - ec
      - verify-internal
      - egress
    user: "999:999"
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    pids_limit: 256
    mem_limit: 512m
    restart: unless-stopped

  verifier:
    image: ghcr.io/geoffreycoulaud/emule-indexer-verifier:latest
    build:
      context: .
      dockerfile: packages/verifier/Dockerfile
    profiles: [full]                            # full UNIQUEMENT
    environment:
      QUARANTINE_DIR: /quarantine
      VERIFIER_HOST: 0.0.0.0
      VERIFIER_PORT: "8000"
      VERIFIER_CONFIG: /config/verifier.yaml
      # clamav (3e source de verdict par signatures, opt-in deploiement full) : la base est lue RO
      # depuis le volume clamav-db (peuple par le sidecar freshclam) ; le verifier ne fetch JAMAIS
      # (internal: true preserve). Les rlimits du child d'analyse sont relaches car clamscan charge
      # toute la base (~centaines de Mo) ; mem_limit releve en consequence (sinon OOM avant rlimit).
      ENABLED_CHECKS: type_sniff,ffprobe,clamav
      CLAMAV_DB_DIR: /clamav-db
      RLIMIT_AS_BYTES_CLAMAV: "1610612736"        # 1.5 Gio (ordre de grandeur, a valider §6.1)
      RLIMIT_CPU_S_CLAMAV: "120"
    volumes:
      - quarantine:/quarantine:ro               # lit la quarantaine en RO (jamais d'ecriture)
      - clamav-db:/clamav-db:ro                 # base de signatures clamav en RO (ecrite par freshclam)
      - ./config/verifier.yaml:/config/verifier.yaml:ro
    networks:
      - verify-internal                         # SEUL sur le reseau interne (pas d'Internet)
    healthcheck:
      test:
        - "CMD"
        - "python"
        - "-c"
        - "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 10s
    user: "999:999"
    read_only: true
    tmpfs:
      - /tmp                                     # mkdtemp de l'enfant d'analyse (D-analysis)
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    pids_limit: 256
    mem_limit: 2g                                # > rlimit AS clamav (1.5 Gio) sinon OOM-cgroup avant rlimit
    restart: unless-stopped

  freshclam:
    # Sidecar de provisioning de la base de signatures clamav : freshclam met a jour la base dans
    # le volume clamav-db (RW) ; le verifier la lit en RO (il ne fetch JAMAIS => internal: true
    # preserve). Image officielle clamav (freshclam + clamscan inclus ; on n'utilise ici que
    # freshclam, le verifier a son propre clamscan apt). Sur `egress` car a besoin d'Internet.
    image: clamav/clamav:1.4
    profiles: [full]
    command: ["freshclam", "--daemon", "--foreground", "--checks=2"]
    environment:
      FRESHCLAM_CHECKS: "2"
    volumes:
      - clamav-db:/var/lib/clamav               # ECRIT la base de signatures ici (RW)
    networks:
      - egress
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    # PAS de read_only : freshclam DOIT ecrire la base dans le volume (contrairement au verifier).
    restart: unless-stopped

  docker-proxy:
    # Proxy Docker a SURFACE MINIMALE pour le port-sync (High-ID) : autorise UNIQUEMENT
    # POST /v1.x/containers/amuled/restart (rien d'autre — deny par defaut, ^/$ ajoutes auto par
    # wollomatic). Le crawler ne voit JAMAIS le socket Docker, il ne parle qu'a ce proxy sur `ec`.
    # N'est utile QUE si le port-sync est configure (gluetun_control_url+restarter_url dans
    # local.yaml) ; sinon le crawler ne l'appelle jamais.
    image: wollomatic/socket-proxy:1.12.2     # epingle (jamais latest) ; allowlist par regex+methode
    profiles: [full]
    command:
      - "-loglevel=info"
      - "-allowfrom=0.0.0.0/0"                # joignable depuis `ec` (pas d'egress : reseau interne)
      - "-listenip=0.0.0.0"
      - "-proxyport=2375"
      - "-socketpath=/var/run/docker.sock"
      - "-allowPOST=/v1\\..{1,2}/containers/amuled/restart"   # ^ et $ ajoutes automatiquement
    user: "65534:${DOCKER_GID:-0}"            # nobody + GID du groupe docker de l'hote (cf. .env)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - ec
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    read_only: true
    restart: unless-stopped

networks:
  ec: {}
  verify-internal:
    internal: true                              # pas d'Internet pour le verifier (ni son enfant)
  egress: {}

volumes:
  quarantine: {}
  catalog-db: {}
  local-db: {}
  amule-state: {}
  clamav-db: {}                                 # base de signatures clamav : freshclam ecrit, verifier lit RO
