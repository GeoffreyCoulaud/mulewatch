[project]
name = "catalog-matching"
version = "0.0.0"
description = "Moteur de matching fichierâ†’Ă©pisode (domaine pur, YAML-driven) â€” partagĂ© crawler/webui"
requires-python = ">=3.14"
dependencies = [
    "rapidfuzz>=3.14.5",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/catalog_matching"]

[tool.pytest.ini_options]
addopts = '--cov=catalog_matching --cov-report=term-missing --cov-fail-under=100 --strict-markers'
testpaths = ["tests"]

[tool.coverage.run]
branch = true
source = ["catalog_matching"]

[tool.coverage.report]
show_missing = true
fail_under = 100
exclude_also = ["if TYPE_CHECKING:"]
